name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADMIN_BOOTSTRAP_CODE: "ci-bootstrap-${{ github.run_id }}-${{ github.run_attempt }}"
      VITE_ENABLE_AI: "false"
      VITE_ENABLE_DEBUG_CONTENT_SEED: "false"
      VITE_SPACETIMEDB_HOST: "ws://127.0.0.1:3001"
      VITE_SPACETIMEDB_DB_NAME: "grezwandererdata"
      SMOKE_STDB_HOST: "ws://127.0.0.1:3001"
      SMOKE_STDB_DB: "grezwandererdata"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSfL https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          "$HOME/.local/bin/spacetime" version install 2.0.1
          "$HOME/.local/bin/spacetime" version use 2.0.1
          "$HOME/.local/bin/spacetime" version list

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install SpacetimeDB module dependencies
        working-directory: spacetimedb
        run: npm ci

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Unit and integration tests
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Backend guardrails
        run: bun run backend:validate

      - name: Content manifest check
        run: bun run content:manifest:check

      - name: Regenerate content snapshot
        run: bun run content:extract

      - name: Obsidian coverage check
        run: bun run content:obsidian:coverage:check

      - name: Map metrics snapshot check
        run: bun run content:map:metrics:check

      - name: Content drift verify
        run: bun run content:drift:verify

      - name: Case01 content smokes
        run: |
          bun run smoke:case01-entry
          bun run smoke:case01-mainline
          bun run smoke:case01-branches

      - name: Build SpacetimeDB module
        run: spacetime build --module-path spacetimedb

      - name: Start local SpacetimeDB
        run: |
          nohup spacetime start --listen-addr 127.0.0.1:3001 > spacetime-start.log 2>&1 &
          for attempt in {1..60}; do
            if bash -lc ">/dev/tcp/127.0.0.1/3001" >/dev/null 2>&1; then
              echo "SpacetimeDB is ready."
              exit 0
            fi
            sleep 1
          done
          echo "SpacetimeDB did not start in time."
          tail -n 200 spacetime-start.log || true
          exit 1

      - name: Publish local module for smoke tests
        run: bun run spacetime:publish:local:clear

      - name: Bootstrap local admin
        run: bun run bootstrap:admin -- --host ws://127.0.0.1:3001 --db grezwandererdata

      - name: Smoke suite
        run: bun run smoke:all
