name: Deploy Karlsruhe Event

on:
  push:
    branches:
      - release/karlsruhe

jobs:
  deploy:
    name: Deploy Karlsruhe Platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'detective-prod-8f6f0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GCP Secrets
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GCP_CREDENTIALS secret is empty! Ensure it is set in Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and Push Container
        run: |
          docker build -t europe-west3-docker.pkg.dev/${PROJECT_ID}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }} ./cloud_run/scene_gen
          docker push europe-west3-docker.pkg.dev/${PROJECT_ID}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: karlsruhe-scene-gen
          image: europe-west3-docker.pkg.dev/${PROJECT_ID}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }}
          region: europe-west3
          project_id: ${{ env.PROJECT_ID }}
          flags: --allow-unauthenticated

      # --- Frontend Steps ---

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- --yes
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release config
        run: bun run release:config:prepare
        env:
          RELEASE_PROFILE: karlsruhe_event
          KARLSRUHE_ENTRY_TOKEN: ${{ secrets.KARLSRUHE_ENTRY_TOKEN }}

      - name: Build Frontend
        run: bun run build:karlsruhe
        env:
          VITE_RELEASE_PROFILE: karlsruhe_event
          VITE_SPACETIMEDB_DB_NAME: grezwandererdata-karlsruhe
          VITE_SCENE_GEN_BASE_URL: /api
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_KARLSRUHE_ENTRY_TOKEN: ${{ secrets.KARLSRUHE_ENTRY_TOKEN }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_CREDENTIALS }}
          projectId: ${{ env.PROJECT_ID }}
          target: karlsruhe-event
