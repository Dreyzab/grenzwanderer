name: Deploy Karlsruhe Event

on:
  push:
    branches:
      - release/karlsruhe

jobs:
  deploy-scene-gen:
    name: Deploy Scene Gen (Cloud Run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and Push Container
        run: |
          docker build -t europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }} ./cloud_run/scene_gen
          docker push europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: karlsruhe-scene-gen
          image: europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/grenzwanderer/karlsruhe-scene-gen:${{ github.sha }}
          region: europe-west3
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: --allow-unauthenticated

  deploy-frontend:
    name: Deploy Frontend (Firebase)
    needs: deploy-scene-gen
    runs-on: ubuntu-latest
    env:
      VITE_RELEASE_PROFILE: karlsruhe_event
      VITE_SPACETIMEDB_DB_NAME: grezwandererdata-karlsruhe
      VITE_SCENE_GEN_BASE_URL: /api
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
      VITE_KARLSRUHE_ENTRY_TOKEN: ${{ secrets.KARLSRUHE_ENTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release config
        run: bun run release:config:prepare
        env:
          RELEASE_PROFILE: karlsruhe_event
          KARLSRUHE_ENTRY_TOKEN: ${{ secrets.KARLSRUHE_ENTRY_TOKEN }}

      - name: Build
        run: bun run build:karlsruhe

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          target: karlsruhe-event
