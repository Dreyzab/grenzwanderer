name: Deploy Production (Freiburg)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install SpacetimeDB CLI (Non-interactive)
        run: |
          curl -sSfL https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Publish SpacetimeDB Module
        env:
          STDB_OPERATOR_TOKEN: ${{ secrets.STDB_OPERATOR_TOKEN }}
        run: |
          # Use operator token for maincloud publishing
          # Note: STDB_OPERATOR_TOKEN must be configured in repository secrets
          spacetime login --token "$STDB_OPERATOR_TOKEN"
          bun run spacetime:publish

      - name: Sync Narrative Content
        env:
          SPACETIMEDB_OPERATOR_TOKEN: ${{ secrets.STDB_OPERATOR_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          bun run content:release:freiburg -- --version $VERSION
      - name: Build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_RELEASE_PROFILE: "freiburg_detective"
          VITE_SPACETIMEDB_HOST: "https://maincloud.spacetimedb.com"
          VITE_SPACETIMEDB_DB_NAME: "grezwandererdata"
        run: bun run build:freiburg

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy to Firebase
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: bun run deploy:firebase:freiburg
