name: PR Preview Artifact

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    env:
      VITE_SPACETIMEDB_HOST: "ws://localhost:3000"
      VITE_SPACETIMEDB_DB_NAME: "grezwandererdata"
      VITE_ENABLE_AI: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend artifact
        run: bun run build

      - name: Resolve artifact name
        id: artifact
        run: echo "name=grenzwanderer-pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist
          retention-days: 14
